<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Backoffice</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body class="d-flex flex-column" style="min-height: 100vh" data-bs-theme="dark">
    <header>
      <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
          <a class="navbar-brand" href="#">
            <img
              src="https://img.freepik.com/vettori-premium/orologio-vintage-illustrazione-del-design-del-logo-per-l-azienda-di-orologi-combina-elementi-classici-e-moderni_553722-1070.jpg"
              alt="logo"
              style="width: 80px; border-radius: 50%"
            />
          </a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarScroll" aria-controls="navbarScroll" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarScroll">
            <ul class="navbar-nav me-auto my-2 my-lg-0 navbar-nav-scroll" style="--bs-scroll-height: 100px">
              <li class="nav-item text-center">
                <a class="nav-link" aria-current="page" href="./homepage.html">Home</a>
              </li>
              <li class="nav-item text-center">
                <a class="nav-link active" href="#">Create new product</a>
              </li>
              <li class="nav-item text-center">
                <a class="nav-link" href="#">Custom your product</a>
              </li>
            </ul>
            <div class="form-check form-switch mx-3">
              <input class="form-check-input" type="checkbox" value="" id="checkNativeSwitch" switch />
              <label class="form-check-label" for="checkNativeSwitch"> Theme</label>
            </div>
            <form class="d-flex" role="search">
              <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" />
              <button type="button" class="btn btn-outline-warning">Search</button>
            </form>
          </div>
        </div>
      </nav>
    </header>
    <main class="flex-grow-1">
      <div class="container my-4">
        <div class="row justify-content-center">
          <form class="col-12 col-md-10 col-lg-8" id="form">
            <h1 class="display-6" id="title-backoffice">Crea il tuo prodotto</h1>
            <div class="mb-3">
              <label for="name-input" class="form-label">Name</label>
              <input type="text" class="form-control" id="name-input" required />
            </div>
            <div class="mb-3">
              <label for="description-input" class="form-label" required>Describe your product</label>
              <textarea id="description-input" class="form-control"></textarea>
            </div>
            <div class="mb-3">
              <label for="brand-input" class="form-label">Brand</label>
              <input type="text" class="form-control" id="brand-input" required />
            </div>
            <div class="mb-3">
              <label for="image-input" class="form-label">Product's image's URL</label>
              <input type="text" class="form-control" id="image-input" required />
            </div>
            <div class="mb-3">
              <label for="price-input" class="form-label">Price</label>
              <input type="number" class="form-control" id="price-input" required />
            </div>
            <button type="submit" class="btn btn-primary">Submit</button>
          </form>
        </div>
      </div>
    </main>
    <footer class="bg-warning text-dark py-3 text-center">
      <p id="data-footer" class="m-0">2026</p>
    </footer>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="./SCRIPT/backoffice.js"></script>
  </body>
</html>
